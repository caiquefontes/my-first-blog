{% extends 'blog/base.html' %}
{% load static %}


{% block content %}

    {% for post in posts %}
        <div class="post">
            <div class="date">
                <p>created date: {{ post.created_date }}</p>
            </div>
            <h2><a href="{% url 'blog:post_detail' pk=post.pk %}">{{ post.title }}</a></h2>
            <p>{{ post.text|truncatechars:200 }}</p>
        </div>
    {% endfor %}

{% endblock content %}
