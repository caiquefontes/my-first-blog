{% load static %}
<html>
    <head>
        <title>Blog Django Girls</title>
        <link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/bootstrap/3.2.0/css/bootstrap.min.css">
        <link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/bootstrap/3.2.0/css/bootstrap-theme.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link href="//fonts.googleapis.com/css?family=Lobster&subset=latin,latin-ext" rel="stylesheet" type="text/css">
        <link rel="stylesheet" href="{% static 'css/blog.css' %}">
    </head>
    <body>
        <div class="page-header">
            {% if user.is_authenticated %}
                <a href="{% url 'blog:post_new' %}" class="top-menu"><span class="glyphicon glyphicon-plus"></span></a>
                <a href="{% url 'blog:post_draft_list' %}" class="top-menu"><span class="fa fa-pencil-square-o"></span></a>
                <form action="{% url 'logout' %}" method="post" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="top-menu" style="background: none; border: none; padding: 0; cursor: pointer;">
                        <p id="logout">Hello {{ user.username }} <small>(Log out)</small></p>
                    </button>
                </form>
                {% comment %} <p id="logout" class="top-menu">Hello {{ user.username }} <small><a href="{% url 'logout' %}">(Log out)</a></small></p> {% endcomment %}

            {% else %}

                <a href="{% url 'login' %}" class="top-menu op-menu glyphicon glyphicon-user">Login</a>

            {% endif %}

            <h1><a href="/">Django Girls Blog</a></h1>
        </div>
        <div class="content container-fluid">
            <div class="row">
                <div class="col-md-8">
                    {% block content %}
                    {% endblock %}
                </div>    
            </div>
        </div>
    </body>
</html>
